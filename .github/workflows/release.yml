name: Release

# Triggered by pushing a tag like v0.1.0. Runs the test suite, packages a
# zip archive, and creates a DRAFT GitHub release. It never publishes the
# release automatically — a maintainer must review and publish it by hand.
# This matches the project's GitHub-publish approval gate
# (APPROVE_GITHUB_PUBLISH_MOBILISTICA_AUDIT in docs/PROJECT_BRIEF.md).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run test suite
        run: npm test

      - name: Build release archive
        run: |
          mkdir -p dist
          zip -r "dist/mobilistica-mobile-commerce-audit-${GITHUB_REF_NAME}.zip" . \
            -x "node_modules/*" \
            -x ".git/*" \
            -x "dist/*" \
            -x "deploy-packages/*" \
            -x "reports/*"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
