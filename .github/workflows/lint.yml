name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Runs directly via npx against the pinned "eslint@9" major version, using the
      # minimal dependency-free flat config in this same directory. Flat config is
      # the default (and only) config format in ESLint 9, so no eslintrc-era flags
      # are passed here — ESLint 9's flat-config CLI rejects those as invalid options.
      - name: Run ESLint (src/, cli/)
        run: npx --yes eslint@9 src cli --config .github/eslint.config.mjs
