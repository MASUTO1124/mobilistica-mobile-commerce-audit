version: 2
updates:
  # The diagnostic core has zero runtime dependencies by design, but
  # devDependencies (e.g. linting) and any future package additions
  # should still be monitored.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"

  # Keep GitHub Actions themselves current even though there are no
  # npm runtime dependencies to track.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
