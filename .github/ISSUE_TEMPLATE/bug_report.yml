name: Bug report
description: Something in the audit engine, CLI, web app, or Claude Code skill isn't working as expected.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please **do not** include
        API keys or credentials in this form — see [SECURITY.md](../../SECURITY.md)
        if this is a vulnerability rather than a bug.

  - type: dropdown
    id: surface
    attributes:
      label: Where did this happen?
      options:
        - CLI (cli/mobilistica-audit.mjs)
        - Web version (mobilistica.com)
        - Claude Code skill
        - Diagnostic core (src/mobilistica_audit) — used as a library
        - Not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `mobilistica-audit --version`, or the commit/tag if running from source.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command or URL used
      description: The exact CLI command (flags included) or the URL you submitted to the web tool. Do NOT include an API key value — replace it with `--api-key ***`.
      placeholder: mobilistica-audit https://example.com --format json
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the relevant output. For scoring/priority disagreements, paste the specific `Finding` object from `--format json` output if possible.
      render: shell
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version (if CLI/core)
      placeholder: "v20.x / v22.x"

  - type: input
    id: os
    attributes:
      label: Operating system (if CLI/core)
      placeholder: "Windows 11 / macOS 14 / Ubuntu 22.04"

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have removed any API keys or credentials from this report.
          required: true
        - label: I have checked existing issues and this isn't a duplicate.
          required: true
