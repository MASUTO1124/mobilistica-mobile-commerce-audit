name: Feature request
description: Suggest a new check, report format, or capability.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests that describe the **use case** (what you're trying to
        do, and why the current behavior falls short) get prioritized faster
        than requests that only describe a solution. See
        [ROADMAP.md](../../ROADMAP.md) for current direction before filing.

  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      options:
        - Diagnostic core (new analyzer / check / scoring rule)
        - CLI
        - Web version
        - Claude Code skill
        - Reports (HTML/Markdown/CSV/Claude instructions)
        - Documentation
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not just the desired feature.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Optional — a rough idea is fine.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: This isn't asking for a ranking/traffic/sales guarantee or automated login/checkout/purchase flow (out of scope — see ROADMAP.md).
          required: true
        - label: I have checked existing issues and this isn't a duplicate.
          required: true
